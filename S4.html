<\/script>`;
  }

  html+=`</body>
</html>`;

  return html;
}

function exportHTML(){
  const html=buildExportHTML();
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=(state.projectName||'invitation')+'.html';
  a.click();URL.revokeObjectURL(url);
  toast('🚀 HTML экспортирован!');
}

function exportBlock(block,index,nested=false){
  const s=block.style||{};
  const c=block.content||{};
  let style='';

  if(state.layoutMode==='free'&&!nested){
    style+=`position:absolute;left:${block.x||0}px;top:${block.y||0}px;`;
    if(block.w)style+=`width:${typeof block.w==='number'?block.w+'px':block.w};`;
  }
  if(state.layoutMode==='flow'&&s.columnSpan&&!nested)style+=`grid-column:span ${Math.max(1,s.columnSpan)};`;
  if(s.padding!==undefined)style+=`padding:${s.padding}px;`;
  if(s.backgroundColor&&s.backgroundColor!=='transparent')style+=`background-color:${s.backgroundColor};`;
  if(s.backgroundImage)style+=`background-image:url('${s.backgroundImage}');background-size:${s.backgroundSize||'cover'};background-position:${s.backgroundPosition||'center'};background-repeat:no-repeat;`;
  if(s.borderRadius)style+=`border-radius:${s.borderRadius}px;`;
  if(s.opacity!==undefined&&s.opacity!==1)style+=`opacity:${s.opacity};`;
  if(s.borderWidth)style+=`border:${s.borderWidth}px solid ${s.borderColor||'#ccc'};`;
  if(s.marginTop)style+=`margin-top:${s.marginTop}px;`;
  if(s.marginBottom)style+=`margin-bottom:${s.marginBottom}px;`;

  let animClass='';
  let animStyle='';
  if(s.animation&&s.animation!=='none'){
    animClass=' anim';
    animStyle=`;animation:${s.animation} ${s.animationDuration||0.8}s ${s.animationEasing||'ease'} both;animation-delay:${(s.animationDelay??(index*0.1))}s`;
  }

  let inner='';
  switch(block.type){
    case 'heading':case 'text':case 'names':case 'date':case 'venue':
    case 'cover':case 'greeting':case 'loveStory':case 'eventDate':case 'location':
    case 'dressCode':case 'wishes':case 'contacts':case 'ending':{
      let ts=`font-family:'${s.fontFamily||'Montserrat'}',sans-serif;font-size:${s.fontSize||16}px;font-weight:${s.fontWeight||'400'};color:${s.color||'#333'};text-align:${s.textAlign||'center'};line-height:${s.lineHeight||1.6};letter-spacing:${s.letterSpacing||0}px;`;
      if(s.fontStyle)ts+=`font-style:${s.fontStyle};`;
      if(s.textTransform)ts+=`text-transform:${s.textTransform};`;
      const tag=block.type==='heading'||block.type==='names'?'h1':block.type==='date'?'h2':'p';
      inner=`<${tag} style="${ts}">${(c.text||'').replace(/\n/g,'<br>')}</${tag}>`;
      break;
    }
    case 'image':
    case 'photo':{
      let imgS=`width:100%;display:block;object-fit:${c.objectFit||state.canvas.photoDefaults?.objectFit||'contain'};height:auto;background:#f7f7fa;`;
      if(s.borderRadius)imgS+=`border-radius:${s.borderRadius}px;`;
      if(s.maxHeight)imgS+=`max-height:${s.maxHeight}px;`;
      inner=`<img src="${c.src||''}" alt="${c.alt||''}" style="${imgS}">`;
      break;
    }
    case 'gallery':{
      const cols=c.columns||3;const gap=s.gap||8;
      inner=`<div class="gallery-grid" style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:${gap}px">`;
      (c.images||[]).forEach(src=>{inner+=`<img src="${src}" alt="Gallery">`});
      inner+='</div>';
      break;
    }
    case 'timer':
    case 'eventTimer':{
      const labels=c.labels||['дней','часов','минут','секунд'];
      let ts=`font-family:'${s.fontFamily||'Montserrat'}',sans-serif;color:${s.color||'#333'};`;
      inner=`<div class="timer-display" data-target="${c.targetDate||''}" style="${ts}">`;
      labels.forEach((l,li)=>{
        inner+=`<div class="timer-unit"><span class="timer-num" style="font-size:${s.fontSize||28}px;font-weight:${s.fontWeight||'700'}">--</span><span class="timer-label">${l}</span></div>`;
      });
      inner+='</div>';
      break;
    }
    case 'divider':{
      const w=c.widthPercent||40;const thick=c.thickness||1;const ds=c.dividerStyle||'solid';const color=s.color||'#ccc';
      let orn='';
      if(c.ornament==='heart')orn='<span style="display:block;text-align:center;font-size:16px;margin:-10px 0;position:relative;z-index:1">♥</span>';
      else if(c.ornament==='diamond')orn='<span style="display:block;text-align:center;font-size:14px;margin:-10px 0;position:relative;z-index:1">◆</span>';
      else if(c.ornament==='star')orn='<span style="display:block;text-align:center;font-size:14px;margin:-10px 0;position:relative;z-index:1">✦</span>';
      else if(c.ornament==='leaf')orn='<span style="display:block;text-align:center;font-size:16px;margin:-12px 0;position:relative;z-index:1">🌿</span>';
      inner=`<div style="text-align:center"><hr style="width:${w}%;border:none;border-top:${thick}px ${ds} ${color};margin:0 auto">${orn}</div>`;
      break;
    }
    case 'button':{
      let bs=`font-family:'${s.fontFamily||'Montserrat'}',sans-serif;font-size:${s.fontSize||14}px;font-weight:${s.fontWeight||'500'};color:${s.color||'#fff'};background:${s.backgroundColor||'#333'};border-radius:${s.borderRadius||6}px;letter-spacing:${s.letterSpacing||2}px;padding:12px 32px;`;
      if(s.textTransform)bs+=`text-transform:${s.textTransform};`;
      if(s.borderWidth)bs+=`border:${s.borderWidth}px solid ${s.borderColor||s.color||'#fff'};`;
      inner=`<div style="text-align:${s.textAlign||'center'}"><a href="${c.link||'#'}" class="btn-el" style="${bs}">${c.text||'Кнопка'}</a></div>`;
      break;
    }
    case 'quote':{
      const qs=`font-family:'${s.fontFamily||'Cormorant Garamond'}',serif;font-size:${s.fontSize||28}px;font-weight:${s.fontWeight||'400'};color:${s.color||'#444'};text-align:${s.textAlign||'center'};line-height:${s.lineHeight||1.5};font-style:${s.fontStyle||'italic'};`;
      inner=`<div style="${qs}">❝ ${(c.text||'').replace(/\n/g,'<br>')} ❞<div style="font-size:${Math.max(12,(s.fontSize||28)*0.56)}px;opacity:.82;margin-top:8px">${c.author||''}</div></div>`;
      break;
    }
    case 'schedule':
    case 'timeline':{
      const rows=(c.items||'').split('\n').filter(Boolean);
      inner=`<div style="font-family:'${s.fontFamily||'Montserrat'}',sans-serif;font-size:${s.fontSize||15}px;font-weight:${s.fontWeight||'400'};color:${s.color||'#444'};line-height:${s.lineHeight||1.8};letter-spacing:${s.letterSpacing||0}px">`;
      rows.forEach(row=>{
        const p=row.split('—');
        inner+=p.length>1?`<div style="display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed rgba(0,0,0,.12);padding:6px 0"><strong>${p[0].trim()}</strong><span>${p.slice(1).join('—').trim()}</span></div>`:`<div style="padding:6px 0">${row}</div>`;
      });
      inner+='</div>';
      break;
    }
    case 'map':
    case 'video':{
      inner=`<iframe src="${c.embedUrl||''}" title="${c.title||'embed'}" style="width:100%;height:${c.height||280}px;border:0;border-radius:${s.borderRadius||10}px;display:block" loading="lazy" allowfullscreen></iframe>`;
      break;
    }
    case 'spacer':
      inner=`<div style="height:${c.height||40}px"></div>`;
      break;
    case 'custom':
    case 'guestForm':
      inner=c.html||'';
      break;
    case 'slider':{
      const imgs=c.images||[];
      inner=`<div data-slider="1" data-interval="${c.interval||3500}" style="position:relative;overflow:hidden;border-radius:${s.borderRadius||state.canvas.photoDefaults?.borderRadius||10}px">`;
      imgs.forEach((src,i)=>{inner+=`<img src="${src}" alt="slide" style="width:100%;display:${i===0?'block':'none'};object-fit:${c.objectFit||state.canvas.photoDefaults?.objectFit||'contain'};max-height:${s.maxHeight||420}px;background:#f5f5f8">`;});
      inner+='</div>';
      break;
    }
    case 'containerGrid':{
      ensureContainerChildren(block);
      const gap=c.gap||12;
      inner=`<div class="container-grid" style="display:flex;flex-direction:column;gap:${gap}px;">`;
      const children=(c.children||[]).map(childId=>getBlock(childId)).filter(Boolean);
      if(!children.length){
        inner+='<div class="container-grid-item" style="background:#fafafa;padding:16px;text-align:center;color:#667">Drop block here</div>';
      }else{
        children.forEach((child,idx)=>{
          inner+='<div class="container-grid-item">';
          if(child.visible!==false)inner+=exportBlock(child,idx,true);
          inner+='</div>';
        });
      }
      inner+='</div>';
      break;
    }
  }

  return `<div class="block${animClass}" style="${style}${animStyle}">${inner}</div>\n`;
}

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey){
    if(e.key==='z'){e.preventDefault();if(e.shiftKey)redo();else undo()}
    if(e.key==='y'){e.preventDefault();redo()}
    if(e.key==='s'){e.preventDefault();saveProjectFile()}
    if(e.key==='d'&&state.selectedId){e.preventDefault();duplicateBlock(state.selectedId)}
  }
  if(e.key==='Delete'&&state.selectedId){
    const active=document.activeElement;
    if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.contentEditable==='true'))return;
    removeBlock(state.selectedId);
  }
  if(e.key==='Escape'){
    state.selectedId=null;
    fullRender();
  }
});

// ===================== INITIALIZATION =====================
function init(){
  const loaded=loadAutoSave();
  if(!loaded){
    // Apply default minimalist template
    applyTemplateData(BUILTIN_TEMPLATES.minimalist.data);
  }
  saveHistory();
  fullRender();
  setPreviewDevice(state.previewDevice||'desktop');
  if(state.canvas.cursorStyle&&state.canvas.cursorStyle!=='default')document.body.style.cursor='pointer';

  // Timer update interval
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(updateTimers,1000);

  // Canvas area click to deselect
  document.getElementById('canvas-area').addEventListener('click',e=>{
    if(e.target.id==='canvas-area'){
      state.selectedId=null;
      renderCanvas();renderLayers();renderProperties();
    }
  });

  console.log('💍 Wedding Invitation Designer Pro initialized');
}

function applyTemplateData(data){
  const d=deepClone(data);
  state.canvas=normalizeCanvas(d.canvas||state.canvas);
  state.layoutMode=d.layoutMode||'flow';
  state.blocks=(d.blocks||[]).map(b=>{
    if(!b.id)b.id=uid();
    if(b.visible===undefined)b.visible=true;
    if(!b.x)b.x=50;if(!b.y)b.y=50;
    if(!b.w)b.w='100%';if(!b.h)b.h='auto';
    return b;
  });
  normalizeContainerChildren();
  state.selectedId=null;
}

// Start
init();
</script>
